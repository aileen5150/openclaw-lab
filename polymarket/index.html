<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>🦐 Polymarket 模拟盘</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;
  --green:#3fb950;--red:#f85149;--yellow:#d29922;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.5}
a{color:var(--accent);text-decoration:none}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-title{font-weight:600;font-size:16px}
.topbar-sub{font-size:12px;color:var(--muted)}
.page{padding:16px;max-width:900px;margin:0 auto}
.section-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:20px 0 10px}
.hero{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.hero-left .hero-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.hero-left .hero-btc{font-size:32px;font-weight:800;color:var(--yellow);letter-spacing:-1px;line-height:1.1}
.hero-right{text-align:right}
.hero-right .hero-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.hero-right .hero-pnl{font-size:26px;font-weight:800;line-height:1.1}
.goal-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.goal-header{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px}
.goal-header span:last-child{font-weight:600;color:var(--text)}
.progress-track{background:#21262d;border-radius:6px;height:8px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:100%;border-radius:6px;transition:width .3s}
.goal-footer{display:flex;justify-content:space-between;font-size:12px}
.mini-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
@media(min-width:500px){.mini-stats{grid-template-columns:repeat(4,1fr)}}
.mini-stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px}
.mini-stat .ms-label{font-size:11px;color:var(--muted);margin-bottom:2px}
.mini-stat .ms-value{font-size:16px;font-weight:700}
.pos-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.pos-title{font-size:14px;font-weight:500;margin-bottom:10px;line-height:1.4}
.pos-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.pos-badge{font-size:12px;font-weight:600;padding:2px 10px;border-radius:20px}
.pos-stat-label{font-size:12px;color:var(--muted)}
.pos-stat{font-size:13px;font-weight:500;margin-right:4px}
.pos-pnl{font-size:14px;font-weight:700;margin-left:auto}
.hist-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.hist-row:last-child{border-bottom:none}
.hist-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;white-space:nowrap}
.hist-market{font-size:13px;color:var(--text);flex:1;min-width:120px}
.hist-outcome{font-size:12px;color:var(--muted);white-space:nowrap}
.hist-amount{font-size:13px;font-weight:500;white-space:nowrap}
.hist-pnl{font-size:13px;font-weight:600;white-space:nowrap}
.hist-time{font-size:11px;color:var(--muted);white-space:nowrap;margin-left:auto}
.card-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.footer{text-align:center;font-size:12px;color:var(--muted);padding:24px 0 16px}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <div class="topbar-title">🦐 Polymarket 模拟盘</div>
    <div class="topbar-sub">更新: 2026-03-22 16:03 UTC</div>
  </div>
  <a href="../index.html" style="font-size:13px;color:var(--muted)">← Lab</a>
</div>

<div class="page">
  <div class="hero">
    <div class="hero-left">
      <div class="hero-label">BTC 现价</div>
      <div class="hero-btc">$68,863</div>
    </div>
    <div class="hero-right">
      <div class="hero-label">模拟盘总盈亏</div>
      <div class="hero-pnl" style="color:#3fb950">+$0<br><span style="font-size:14px;font-weight:400">+0.0%</span></div>
    </div>
  </div>

  <div class="goal-card">
    <div class="goal-header">
      <span>目标进度  $10,000</span>
      <span>$1,000 / $10,000</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" style="width:10.00%;background:#3fb950"></div>
    </div>
    <div class="goal-footer">
      <span style="color:var(--muted)">10.0% 已完成</span>
      <span style="color:var(--muted)">还需 +9,000</span>
    </div>
  </div>

  <div class="mini-stats">
    <div class="mini-stat">
      <div class="ms-label">可用余额</div>
      <div class="ms-value" style="color:var(--accent)">$1,000</div>
    </div>
    <div class="mini-stat">
      <div class="ms-label">持仓数</div>
      <div class="ms-value">0</div>
    </div>
    <div class="mini-stat">
      <div class="ms-label">胜率</div>
      <div class="ms-value" style="color:var(--green)">—</div>
    </div>
    <div class="mini-stat">
      <div class="ms-label">交易笔数</div>
      <div class="ms-value">0</div>
    </div>
  </div>

  <div class="section-title">当前持仓 · 0 个</div>
  <div style="padding:24px;text-align:center;color:#8b949e">暂无持仓</div>

  <div class="section-title">最近交易</div>
  <div class="card-wrap">
    <div style="padding:24px;text-align:center;color:#8b949e">暂无记录</div>
  </div>

  <div class="footer">初始 $1,000 · 目标 $10,000 · 共 0 笔交易</div>
</div>
</body>
</html>
